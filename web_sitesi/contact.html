  <section id="contact">
    <div class="wrap">
      <h2>Bana Ulaşın</h2>
      <p>Proje fikirleri ve sorularınız için bana ulaşın.</p>

      <div class="contact-grid">
        <div class="card">
          <form onsubmit="event.preventDefault(); alert('Demo form: Burayı e-posta servisine bağlayabiliriz 🙂');">
            <label>Ad Soyad</label>
            <input placeholder="Adınız" />

            <label>E-posta</label>
            <input type="email" placeholder="ornek@mail.com" />

            <label>Mesaj</label>
            <textarea placeholder="Merhaba..."></textarea>

            <div class="cta" style="margin-top:14px;">
              <button class="btn primary" type="submit">Gönder</button>
            </div>
          </form>
        </div>

        <div class="mapbox">
          <div id="contactMap" class="map" aria-label="İletişim haritası"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="foot">
     © <span id="year"></span> Rıdvan | Az laf, bol harita
  </div>
